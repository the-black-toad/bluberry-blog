lang: en
timezone: America/New_York

title: A Blog About Building
tagline: A build log for an autonomous blueberry harvesting robot
avatar: https://pub-7dccfb8281d647ea908c15e9e1c6a9cb.r2.dev/images/IMG_5319.jpg
description: >-
  Documenting the development of an autonomous blueberry harvesting robot —
  from camera calibration and stereo vision to ML-based berry detection and robotic picking.

url: "https://the-black-toad.github.io"
baseurl: "/bluberry-blog"

github:
  username: the-black-toad

social:
  name: Thomas
  email: olmstedtgo@gmail.com
  links:
    - https://github.com/the-black-toad

theme: jekyll-theme-chirpy

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap

paginate: 10

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
